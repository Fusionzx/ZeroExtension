  function clampAvatarCropOffset(state) {
    if (!state || !state.img) return;
    var iw = state.img.naturalWidth || state.img.width;
    var ih = state.img.naturalHeight || state.img.height;
    var dispW = iw * state.scale;
    var dispH = ih * state.scale;
    var maxX = Math.max(0, (dispW - AVATAR_CROP_VIEWPORT) / 2);
    var maxY = Math.max(0, (dispH - AVATAR_CROP_VIEWPORT) / 2);
    state.offsetX = Math.max(-maxX, Math.min(maxX, state.offsetX));
    state.offsetY = Math.max(-maxY, Math.min(maxY, state.offsetY));
  }

  function renderAvatarCropPreview() {
    var state = avatarCropState;
    var imgEl = document.getElementById('avatar-crop-img');
    if (!state || !imgEl || !state.img) return;
    clampAvatarCropOffset(state);
    var iw = state.img.naturalWidth || state.img.width;
    var ih = state.img.naturalHeight || state.img.height;
    var dispW = iw * state.scale;
    var dispH = ih * state.scale;
    var x = (AVATAR_CROP_VIEWPORT - dispW) / 2 + state.offsetX;
    var y = (AVATAR_CROP_VIEWPORT - dispH) / 2 + state.offsetY;
    imgEl.style.width = dispW + 'px';
    imgEl.style.height = dispH + 'px';
    imgEl.style.left = x + 'px';
    imgEl.style.top = y + 'px';
  }

  function exportAvatarCropImage(state) {
    if (!state || !state.img) return '';
    var iw = state.img.naturalWidth || state.img.width;
    var ih = state.img.naturalHeight || state.img.height;
    var dispW = iw * state.scale;
    var dispH = ih * state.scale;
    var x = (AVATAR_CROP_VIEWPORT - dispW) / 2 + state.offsetX;
    var y = (AVATAR_CROP_VIEWPORT - dispH) / 2 + state.offsetY;
    var factor = AVATAR_CROP_OUTPUT / AVATAR_CROP_VIEWPORT;
    var canvas = document.createElement('canvas');
    canvas.width = AVATAR_CROP_OUTPUT;
    canvas.height = AVATAR_CROP_OUTPUT;
    var ctx = canvas.getContext('2d');
    ctx.beginPath();
    ctx.arc(AVATAR_CROP_OUTPUT / 2, AVATAR_CROP_OUTPUT / 2, AVATAR_CROP_OUTPUT / 2, 0, Math.PI * 2);
    ctx.closePath();
    ctx.clip();
    ctx.drawImage(state.img, x * factor, y * factor, dispW * factor, dispH * factor);
    return canvas.toDataURL('image/jpeg', 0.88);
  }

  function closeAvatarCropEditor(cancelled) {
    var overlay = document.getElementById('avatar-crop-overlay');
    var viewport = document.getElementById('avatar-crop-viewport');
    if (!overlay) return;
    overlay.classList.remove('open');
    overlay.setAttribute('aria-hidden', 'true');
    if (viewport) viewport.classList.remove('is-dragging');
    avatarCropSession = null;
    if (cancelled && avatarCropState && avatarCropState.onCancel) {
      try { avatarCropState.onCancel(); } catch (eCancel) {}
    }
    avatarCropState = null;
  }

  function openAvatarCropEditor(file, onApply, onCancel, onOpen) {
    if (!file || !/^image\//.test(file.type || '')) {
      showToast(t('misc_avatar_invalid'), 'err');
      if (onCancel) onCancel();
      return;
    }
    var overlay = document.getElementById('avatar-crop-overlay');
    var viewport = document.getElementById('avatar-crop-viewport');
    var imgEl = document.getElementById('avatar-crop-img');
    var zoomInput = document.getElementById('avatar-crop-zoom');
    if (!overlay || !viewport || !imgEl || !zoomInput) {
      if (onCancel) onCancel();
      return;
    }

    document.getElementById('avatar-crop-title').textContent = t('misc_avatar_crop_title');
    document.getElementById('avatar-crop-desc').textContent = t('misc_avatar_crop_desc');
    document.getElementById('avatar-crop-zoom-label').textContent = t('misc_avatar_crop_zoom');
    document.getElementById('avatar-crop-cancel').textContent = t('misc_avatar_crop_cancel');
    document.getElementById('avatar-crop-apply').textContent = t('misc_avatar_crop_apply');

    var reader = new FileReader();
    reader.onload = function () {
      var img = new Image();
      img.onload = function () {
        var iw = img.naturalWidth || img.width;
        var ih = img.naturalHeight || img.height;
        if (!iw || !ih) {
          showToast(t('misc_avatar_invalid'), 'err');
          if (onCancel) onCancel();
          return;
        }
        var coverScale = Math.max(AVATAR_CROP_VIEWPORT / iw, AVATAR_CROP_VIEWPORT / ih);
        avatarCropState = {
          img: img,
          offsetX: 0,
          offsetY: 0,
          scale: coverScale,
          coverScale: coverScale,
          onApply: onApply,
          onCancel: onCancel
        };
        imgEl.src = img.src;
        zoomInput.value = '100';
        renderAvatarCropPreview();
        overlay.classList.add('open');
        overlay.setAttribute('aria-hidden', 'false');
        if (onOpen) onOpen();
      };
      img.onerror = function () {
        showToast(t('misc_avatar_invalid'), 'err');
        if (onCancel) onCancel();
      };
      img.src = String(reader.result || '');
    };
    reader.onerror = function () {
      showToast(t('misc_avatar_invalid'), 'err');
      if (onCancel) onCancel();
    };
    reader.readAsDataURL(file);
  }

  function initAvatarCropEditor() {
    var overlay = document.getElementById('avatar-crop-overlay');
    var viewport = document.getElementById('avatar-crop-viewport');
    var zoomInput = document.getElementById('avatar-crop-zoom');
    var cancelBtn = document.getElementById('avatar-crop-cancel');
    var applyBtn = document.getElementById('avatar-crop-apply');
    if (!overlay || !viewport || !zoomInput || !cancelBtn || !applyBtn || viewport.dataset.hxdCropReady === '1') return;
    viewport.dataset.hxdCropReady = '1';

    function pointerDown(clientX, clientY) {
      if (!avatarCropState) return;
      avatarCropSession = {
        startX: clientX,
        startY: clientY,
        baseX: avatarCropState.offsetX,
        baseY: avatarCropState.offsetY
      };
      viewport.classList.add('is-dragging');
    }

    function pointerMove(clientX, clientY) {
      if (!avatarCropSession || !avatarCropState) return;
      avatarCropState.offsetX = avatarCropSession.baseX + (clientX - avatarCropSession.startX);
      avatarCropState.offsetY = avatarCropSession.baseY + (clientY - avatarCropSession.startY);
      renderAvatarCropPreview();
    }

    function pointerUp() {
      if (!avatarCropSession) return;
      avatarCropSession = null;
      viewport.classList.remove('is-dragging');
    }

    viewport.addEventListener('mousedown', function (e) {
      e.preventDefault();
      pointerDown(e.clientX, e.clientY);
    });
    viewport.addEventListener('touchstart', function (e) {
      if (!e.touches || !e.touches[0]) return;
      pointerDown(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: true });
    window.addEventListener('mousemove', function (e) { pointerMove(e.clientX, e.clientY); });
    window.addEventListener('mouseup', pointerUp);
    window.addEventListener('touchmove', function (e) {
      if (!e.touches || !e.touches[0]) return;
      e.preventDefault();
      pointerMove(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: false });
    window.addEventListener('touchend', pointerUp);

    viewport.addEventListener('wheel', function (e) {
      if (!avatarCropState) return;
      e.preventDefault();
      var delta = e.deltaY > 0 ? -8 : 8;
      var next = Math.max(50, Math.min(300, parseInt(zoomInput.value, 10) + delta));
      zoomInput.value = String(next);
      avatarCropState.scale = avatarCropState.coverScale * (next / 100);
      renderAvatarCropPreview();
    }, { passive: false });

    zoomInput.oninput = function () {
      if (!avatarCropState) return;
      avatarCropState.scale = avatarCropState.coverScale * (parseInt(zoomInput.value, 10) / 100);
      renderAvatarCropPreview();
    };

    cancelBtn.onclick = function () { closeAvatarCropEditor(true); };
    applyBtn.onclick = function () {
      if (!avatarCropState) return;
      var data = exportAvatarCropImage(avatarCropState);
      var done = avatarCropState.onApply;
      closeAvatarCropEditor(false);
      if (data && done) done(data);
    };

    overlay.addEventListener('click', function (e) {
      if (e.target === overlay) closeAvatarCropEditor(true);
    });
  }

  function buildAvatarPanel(panelId, regTab) {
    panelId = panelId || 'avatar-panel';
    regTab = regTab || 'misc';
    var wrap = $('div', 'list-block');
    wrap.id = panelId;
    wrap.appendChild($('div', 'section-title', t('misc_avatar_sec')));
    wrap.appendChild($('p', 'group-lead', t('misc_avatar_d')));

    var ul = $('div', 'list');
    var body = $('div', 'avatar-panel-body avatar-dropzone');
    var previewRing = $('div', 'avatar-panel-preview');
    var status = $('div', 'avatar-panel-status');
    var hint = $('div', 'avatar-panel-hint', t('misc_avatar_formats'));
    body.appendChild(previewRing);
    body.appendChild(status);
    body.appendChild(hint);
    ul.appendChild(body);

    var fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = 'image/jpeg,image/png,image/webp,image/*';
    fileInput.style.display = 'none';

    function handleAvatarFile(file) {
      if (!file) return;
      requireAvatarDiscordSession(function(ok) {
        if (!ok) {
          syncAvatarPanelUi(previewRing, status);
          return;
        }
        status.textContent = t('misc_avatar_processing');
        openAvatarCropEditor(file, function (data) {
          setAvatarPreviewData(data);
          syncAvatarPanelUi(previewRing, status);
          postAvatarProfileToServer(data, false);
        }, function () {
          syncAvatarPanelUi(previewRing, status);
        }, function () {
          status.textContent = getAvatarPreviewData() ? t('misc_avatar_loaded') : t('misc_avatar_empty');
        });
      });
    }

    body.onclick = function () {
      requireAvatarDiscordSession(function(ok) {
        if (ok) fileInput.click();
        else syncAvatarPanelUi(previewRing, status);
      });
    };
    body.onkeydown = function (e) {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        requireAvatarDiscordSession(function(ok) {
          if (ok) fileInput.click();
          else syncAvatarPanelUi(previewRing, status);
        });
      }
    };
    body.setAttribute('tabindex', '0');
    body.setAttribute('role', 'button');
    body.setAttribute('aria-label', t('misc_avatar_upload'));

    body.addEventListener('dragover', function (e) {
      e.preventDefault();
      body.classList.add('is-dragover');
    });
    body.addEventListener('dragleave', function () {
      body.classList.remove('is-dragover');
    });
    body.addEventListener('drop', function (e) {
      e.preventDefault();
      body.classList.remove('is-dragover');
      var file = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
      handleAvatarFile(file);
    });

    fileInput.onchange = function () {
      var file = fileInput.files && fileInput.files[0];
      handleAvatarFile(file);
      fileInput.value = '';
    };

    var actions = $('div', 'avatar-actions');
    var pickBtn = $('button', 'btn dark', t('misc_avatar_upload'));
    pickBtn.type = 'button';
    pickBtn.onclick = function (e) {
      e.stopPropagation();
      requireAvatarDiscordSession(function(ok) {
        if (ok) fileInput.click();
        else syncAvatarPanelUi(previewRing, status);
      });
    };
    var clearBtn = $('button', 'btn', t('misc_avatar_clear'));
    clearBtn.type = 'button';
    clearBtn.onclick = function (e) {
      e.stopPropagation();
      setAvatarPreviewData('');
      fileInput.value = '';
      syncAvatarPanelUi(previewRing, status);
      postAvatarProfileToServer('', false);
    };
    actions.appendChild(pickBtn);
    actions.appendChild(clearBtn);
    actions.appendChild(fileInput);
    ul.appendChild(actions);
    wrap.appendChild(ul);
    wrap.appendChild(buildAvatarVisibilityPanel(regTab));
    syncAvatarPanelUi(previewRing, status);
    loadAvatarProfileFromServer(previewRing, status);
    return wrap;
  }

    setLsToggle: function (key, wantOn) {

    perfImport: function (code) {

    syncAfterImport: function () {

    getHxdPerformance: function () {
      var pw = this.parentWin();
      if (pw && pw.HxdPerformance) return pw.HxdPerformance;
      return null;
    },
    perfSnapshotKeys: function () {
      var hp = this.getHxdPerformance();
      if (hp && Array.isArray(hp.SNAPSHOT_KEYS)) return hp.SNAPSHOT_KEYS;
      return PERF_SNAPSHOT_KEYS;
    },
    perfEncodeFallback: function () {
      var keys = this.perfSnapshotKeys();
      var data = {};
      var ls = storageWin().localStorage;
      for (var i = 0; i < keys.length; i++) {
        try {
          var v = ls.getItem(keys[i]);
          if (v !== null) data[keys[i]] = v;
        } catch (eGet) {}
      }
      data._hxd_perf_schema = '1';
      try {
        return btoa(JSON.stringify(data)).replace(/=/g, '');
      } catch (eEnc) {
        return '';
      }
    },
    perfApplyFallback: function (code) {
      code = String(code || '').trim().replace(/^HXZ0[:\s-]*/i, '');
      if (!code) return false;
      while (code.length % 4 !== 0) code += '=';
      var config;
      try {
        config = JSON.parse(atob(code));
      } catch (eDec) {
        return false;
      }
      if (!config || typeof config !== 'object') return false;
      var keys = this.perfSnapshotKeys();
      var ls = storageWin().localStorage;
      for (var c = 0; c < keys.length; c++) {
        try { ls.removeItem(keys[c]); } catch (eClr) {}
      }
      for (var key in config) {
        if (!Object.prototype.hasOwnProperty.call(config, key)) continue;
        if (key === '_hxd_perf_schema') continue;
        if (keys.indexOf(key) === -1) continue;
        try { ls.setItem(key, String(config[key])); } catch (eSet) {}
      }
      try {
        var pw = this.parentWin();
        if (pw && typeof pw.__hxdSyncAllSettingsFromStorage === 'function') pw.__hxdSyncAllSettingsFromStorage();
        else if (pw && typeof pw.__hxdApplyRuntimeConfig === 'function') pw.__hxdApplyRuntimeConfig(config);
      } catch (eLive) {}
      this.syncAfterImport();
      return true;
    },
    copyText: function (text) {
      text = String(text || '');
      if (!text) return Promise.reject(new Error('empty'));
      var pw = this.parentWin();
      if (pw && pw.navigator && pw.navigator.clipboard && pw.navigator.clipboard.writeText) {
        return pw.navigator.clipboard.writeText(text);
      }
      if (navigator.clipboard && navigator.clipboard.writeText) {
        return navigator.clipboard.writeText(text);
      }
      return new Promise(function (resolve, reject) {
        try {
          var ta = document.createElement('textarea');
          ta.value = text;
          ta.setAttribute('readonly', 'readonly');
          ta.style.position = 'fixed';
          ta.style.left = '-9999px';
          document.body.appendChild(ta);
          ta.select();
          var ok = document.execCommand('copy');
          ta.remove();
          if (ok) resolve();
          else reject(new Error('copy failed'));
        } catch (eCopy) {
          reject(eCopy);
        }
      });
    },
    parseHookFromKw: function (kw) {
      if (!kw) return null;
      var parts = String(kw).split(/\s+/);
      for (var i = 0; i < parts.length; i++) {
        var p = parts[i];
        if (/^(tmisc-|tsound-|tvideo-)/.test(p)) return p;
      }
      return null;
    },
    parseLsFromKw: function (kw) {
      if (!kw) return null;
      var parts = String(kw).split(/\s+/);
      for (var i = 0; i < parts.length; i++) {
        if (LS_TOGGLES[parts[i]]) return parts[i];
      }
      return null;
    },
    readInputTolerance: function () {
      var pw = this.parentWin();
      if (pw && typeof pw.__hxdGetInputTolerance === 'function') {
        return pw.__hxdGetInputTolerance();
      }
      try {
        var v = parseInt(storageWin().localStorage.getItem('input_tolerance'), 10);
        if (isNaN(v) || v < 0) return 0;
        if (v > 2) return 2;
        return v;
      } catch (eTol) { return 0; }
    },
    setInputTolerance: function (value) {
      var v = Math.max(0, Math.min(2, parseInt(value, 10) || 0));
      var pw = this.parentWin();
      if (pw && typeof pw.__hxdSetInputTolerance === 'function') {
        pw.__hxdSetInputTolerance(v);
        return;

      try {
        var ls = storageWin().localStorage;
        if (v > 0) ls.setItem('hxd_input_tolerance_unlock', '1');
        else ls.removeItem('hxd_input_tolerance_unlock');
        ls.setItem('input_tolerance', String(v));
        if (pw) pw.dispatchEvent(new Event('storage'));
      } catch (eSetTol) {}
    }
  };

  function toggle(tab, label, hint, on, kw, warnHint) {
    var hook = Bridge.parseHookFromKw(kw);
    var lsKey = Bridge.parseLsFromKw(kw);
    var initialOn = on;
    if (hook) {
      var fromHook = Bridge.readHook(hook);
      if (fromHook !== null) initialOn = fromHook;
    } else if (lsKey) {
      var fromLs = Bridge.readLsToggle(lsKey);
      if (fromLs !== null) initialOn = fromLs;
    }
    var row = $('div', 'list-row click');
    var hintCls = warnHint ? 'hint hint--warn' : 'hint';
    row.innerHTML =
      '<div><div class="label">' + label + '</div>' +
      (hint ? '<div class="' + hintCls + '">' + hint + '</div>' : '') + '</div>' +
      '<label class="sw"><input type="checkbox"' + (initialOn ? ' checked' : '') + '><span class="sw-track"></span></label>';
    var input = row.querySelector('input');
    function applyToggle() {
      var want = input.checked;
      if (hook) Bridge.setHook(hook, want);
      else if (lsKey) Bridge.setLsToggle(lsKey, want);
    }
    input.onchange = applyToggle;
    row.onclick = function (e) {
      if (e.target.tagName === 'INPUT') return;
      if (e.target.closest && e.target.closest('.sw')) return;
      input.checked = !input.checked;
      applyToggle();
    };
    return reg(tab, label, (hint || '') + ' ' + (kw || ''), row);
  }

  var CAMERA_STORAGE = 'hax_input_camera_extra_v2';
  var VANILLA_ACTION_NAMES = [
    'Up', 'Down', 'Left', 'Right', 'Kick', 'ToggleChat', 'FocusChat',
    'ViewModeNext', 'ViewModePrev', 'ToggleMenu', 'ToggleStadium120',
    'StartMatch', 'EndMatch', 'RestartMatch'
  ];
  var CAM_LABEL_TKEYS = [
    'Cam mode dynamic',

  function defaultCameraBinds() {
    var a = [];
    for (var i = 0; i < 9; i++) a.push([]);
    return a;
  }

  function storageWin() {
    var pw = Bridge.parentWin();
    return pw || window;
  }

  function loadCameraBinds() {
    try {
      var raw = storageWin().localStorage.getItem(CAMERA_STORAGE);
      if (raw) {
        var arr = JSON.parse(raw);
        if (Array.isArray(arr) && arr.length === 9) {
          var def = defaultCameraBinds();
          for (var k = 0; k < 9; k++) {
            var row = arr[k];
            if (Array.isArray(row)) {
              var seen = {};
              var clean = [];
              for (var j = 0; j < row.length; j++) {
                var code = row[j] != null ? String(row[j]) : '';
                if (code && !seen[code]) {
                  seen[code] = 1;
                  clean.push(code);
                }
              }
              def[k] = clean;
            }
          }
          return def;
        }
      }
    } catch (eCamLoad) {}
    return defaultCameraBinds();
  }

  function saveCameraBinds(list) {
    try { storageWin().localStorage.setItem(CAMERA_STORAGE, JSON.stringify(list)); } catch (eCamSave) {}
  }

  function assignCameraKey(list, slotIndex, code) {
    if (!code) return;
    if (list[slotIndex].indexOf(code) === -1) list[slotIndex].push(code);
    saveCameraBinds(list);
  }

  function removeCameraKey(list, slotIndex, code) {
    list[slotIndex] = list[slotIndex].filter(function (c) { return c !== code; });
    saveCameraBinds(list);
  }

  function readKeysFromParentRow(parentRow) {
    if (!parentRow) return [];
    var keys = [];
    var kids = parentRow.children;
    for (var i = 1; i < kids.length; i++) {
      var kid = kids[i];
      if (!kid || kid.tagName !== 'DIV') continue;
      if (kid.classList && kid.classList.contains('icon-plus')) continue;
      var clone = kid.cloneNode(true);
      var icons = clone.querySelectorAll('.icon-cancel');
      for (var x = 0; x < icons.length; x++) icons[x].remove();
      var txt = String(clone.textContent || '').trim();
      if (txt) keys.push(txt);
    }
    return keys;
  }

  function loadPlayerKeysMap() {
    try {
      var raw = storageWin().localStorage.getItem('player_keys');
      if (!raw) return {};
      var parsed = JSON.parse(raw);
      return parsed && typeof parsed === 'object' ? parsed : {};
    } catch (ePk) { return {}; }
  }

  function savePlayerKeysMap(map) {
    try { storageWin().localStorage.setItem('player_keys', JSON.stringify(map)); } catch (ePkSave) {}
  }

  function addVanillaKeyNative(parentRow, code) {
    var plus = parentRow && parentRow.querySelector('.icon-plus');
    var dialog = Bridge.settingsDialog();
    var pk = dialog && dialog.querySelector('[data-hook="presskey"]');
    if (!plus || !pk || !code) return false;
    plus.click();
    if (typeof pk.onkeydown !== 'function') return false;
    pk.onkeydown({
      code: code,
      key: code,
      stopPropagation: function () {},
      preventDefault: function () {}
    });
    return true;
  }

  function addVanillaKeyLive(action, code) {
    try {
      var pw = Bridge.parentWin();
      if (pw && typeof pw.__haxAddPlayerKey === 'function') {
        return pw.__haxAddPlayerKey(code, action) === true;
      }
    } catch (eLiveAdd) {}
    return false;
  }

  function removeVanillaKeyLive(code) {
    try {
      var pw = Bridge.parentWin();
      if (pw && typeof pw.__haxRemovePlayerKey === 'function') {
        return pw.__haxRemovePlayerKey(code) === true;
      }
    } catch (eLiveRemove) {}
    return false;
  }

  function resolveVanillaAction(label, parentRow) {
    var i;
    for (i = 0; i < VANILLA_ACTION_NAMES.length; i++) {
      var name = VANILLA_ACTION_NAMES[i];
      if (name === label || translateFromParent(name) === label) return name;
    }
    if (parentRow) {
      var rows = getVanillaParentRows();
      for (i = 0; i < rows.length; i++) {
        if (rows[i] === parentRow && VANILLA_ACTION_NAMES[i]) return VANILLA_ACTION_NAMES[i];
      }
    }
    return null;
  }

  function appendVanillaKeyChip(parentRow, code) {
    var doc = Bridge.parentDoc();
    if (!parentRow || !doc || !code) return;
    var lbl = formatKeyLabel(code);
    var existing = readKeysFromParentRow(parentRow);
    if (existing.indexOf(lbl) !== -1) return;

    var plus = parentRow.querySelector('.icon-plus');
    var chip = doc.createElement('div');
    chip.textContent = lbl;
    var cancel = doc.createElement('i');
    cancel.className = 'icon-cancel';
    cancel.onclick = function () {
      removeVanillaKeyLive(code);
      var map = loadPlayerKeysMap();
      delete map[code];
      savePlayerKeysMap(map);
      chip.remove();
    };
    chip.appendChild(cancel);
    if (plus) parentRow.insertBefore(chip, plus);
    else parentRow.appendChild(chip);
  }

  function addVanillaKey(parentRow, label, code, actionKey) {
    if (!code) return false;
    var row = findParentInputRow(label, actionKey) || parentRow;
    if (!row) return false;
    var action = actionKey || resolveVanillaAction(label, row);
    if (!action) return false;

    // The native settings handler treats Escape as “close settings”. Store it
    // through the live key map directly so assigning ToggleMenu never closes
    // the dialog that is currently capturing the key.
    if (code === 'Escape') {
      addVanillaKeyLive(action, code);
      var escapeMap = loadPlayerKeysMap();
      escapeMap[code] = action;
      savePlayerKeysMap(escapeMap);
      appendVanillaKeyChip(row, code);
      return true;
    }

    addVanillaKeyLive(action, code);
    var before = readKeysFromParentRow(row).join('\n');
    addVanillaKeyNative(row, code);
    var afterRow = findParentInputRow(label, actionKey) || row;
    var after = readKeysFromParentRow(afterRow).join('\n');
    if (before === after) {
      var map = loadPlayerKeysMap();
      map[code] = action;
      savePlayerKeysMap(map);
      appendVanillaKeyChip(afterRow, code);
    }
    return true;
  }

  function removeVanillaKeyFromParent(parentRow, displayLabel) {
    if (!parentRow || !displayLabel) return;
    var kids = parentRow.children;
    for (var i = 1; i < kids.length; i++) {
      var kid = kids[i];
      if (!kid || kid.tagName !== 'DIV') continue;
      var clone = kid.cloneNode(true);
      var icons = clone.querySelectorAll('.icon-cancel');
      for (var x = 0; x < icons.length; x++) icons[x].remove();
      if (String(clone.textContent || '').trim() !== String(displayLabel).trim()) continue;
      var cancel = kid.querySelector('.icon-cancel');
      if (cancel) cancel.click();
      return;
    }
  }

  var activeKeyCaptureCleanup = null;

  function beginKeyCapture(onPick, onEnd) {
    if (typeof activeKeyCaptureCleanup === 'function') {
      try { activeKeyCaptureCleanup(); } catch (eCapStop) {}
      activeKeyCaptureCleanup = null;
    }

    showKeyCaptureOverlay();

    var settled = false;
    function finish(cleanupFn, code) {
      if (settled) return;
      settled = true;
      if (activeKeyCaptureCleanup === cleanupFn) activeKeyCaptureCleanup = null;
      cleanupFn();
      hideKeyCaptureOverlay();
      if (code && typeof onPick === 'function') onPick(code);
      else if (typeof onEnd === 'function') onEnd();
    }

    function cleanupLocal() {
      document.removeEventListener('keydown', onLocalKey, true);
      document.removeEventListener('mousedown', onLocalMouse, true);
    }
    function onLocalKey(ev) {
      ev.preventDefault();
      ev.stopPropagation();
      if (ev.key === 'Escape') {
        // Escape is a valid key binding (for example, ToggleMenu), not a
        // cancellation while the key-capture overlay is active.
        finish(cleanupLocal, 'Escape');
        return;
      }
      if (ev.code) finish(cleanupLocal, ev.code);
    }
    function onLocalMouse(ev) {
      ev.preventDefault();
      ev.stopPropagation();
      finish(cleanupLocal, 'Mouse' + ev.button);
    }
    document.addEventListener('keydown', onLocalKey, true);
    document.addEventListener('mousedown', onLocalMouse, true);
    activeKeyCaptureCleanup = cleanupLocal;
    return true;
  }

  function findParentInputRow(labelNeedle, actionKey) {
    if (actionKey) {
      var byAction = findParentInputRowByAction(actionKey);
      if (byAction) return byAction;
    }
    var dlg = Bridge.settingsDialog();
    if (!dlg) return null;
    var sec = dlg.querySelector('[data-hook="inputsec"]');
    if (!sec) return null;
    var rows = sec.querySelectorAll('.inputrow');
    var needle = String(labelNeedle || '').toLowerCase().replace(/\s+/g, '');
    if (!needle) return null;
    var i, tx, first;
    for (i = 0; i < rows.length; i++) {
      if (rows[i].closest('[data-hook="hxd-camera-extra-wrap"]')) continue;
      if (rows[i].hasAttribute('data-hxd-camera-slot')) continue;
      first = rows[i].children && rows[i].children[0];
      tx = String((first && first.textContent) || '').toLowerCase().replace(/\s+/g, '');
      if (tx === needle) return rows[i];
    }
    for (i = 0; i < rows.length; i++) {
      if (rows[i].closest('[data-hook="hxd-camera-extra-wrap"]')) continue;
      if (rows[i].hasAttribute('data-hxd-camera-slot')) continue;
      first = rows[i].children && rows[i].children[0];
      tx = String((first && first.textContent) || '').toLowerCase().replace(/\s+/g, '');

  var CHAT_SC_STORAGE = 'hax_chat_command_shortcuts';
  var CHAT_DEFAULT_SHORTCUTS = [
    { trigger: '/e number', expansion: '/extrapolation number', locked: true }
  ];

  function escAttr(v) {
    return String(v || '')
      .replace(/&/g, '&amp;')
      .replace(/"/g, '&quot;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function chatIsPro() {
    return multiIsPro();

    return chatIsPro() ? 10 : 2;
  }

  function normalizeChatShortcuts(list) {
    if (!Array.isArray(list)) list = [];
    var out = [];
    list.forEach(function (sc) {
      if (!sc || typeof sc !== 'object') return;
      var trigger = String(sc.trigger || '').trim();
      var expansion = String(sc.expansion || sc.command || '').trim();
      if (!trigger || !expansion) return;
      out.push({ trigger: trigger, expansion: expansion, locked: !!sc.locked });
    });
    CHAT_DEFAULT_SHORTCUTS.forEach(function (def, idx) {
      var found = out.some(function (sc) {
        return sc.trigger.toLowerCase() === def.trigger.toLowerCase();
      });
      if (!found) out.splice(idx, 0, {
        trigger: def.trigger,
        expansion: def.expansion,
        locked: true
      });
    });
    return out;
  }

  function saveChatShortcuts(list) {
    try {
      var clean = normalizeChatShortcuts(list).slice(0, chatMaxShortcuts()).map(function (sc) {
        return { trigger: sc.trigger, expansion: sc.expansion, locked: !!sc.locked };
      });
      storageWin().localStorage.setItem(CHAT_SC_STORAGE, JSON.stringify(clean));
    } catch (eSc) {}
  }

  function chatShortcutRow(tab, trigger, command, kw, opts) {

      '<span class="cs-arrow">→</span>' +
      '<input class="cs-command" type="text" value="' + escAttr(command) + '" spellcheck="false"' + readOnlyAttr + '>' +
      (opts.locked ? '<span class="chip chip--active">' + t('chat_default') + '</span>' : '<span class="chip chip--muted">✕</span>');
    var triggerIn = row.querySelector('.cs-trigger');
    var commandIn = row.querySelector('.cs-command');
    var clearBtn = row.querySelector('.chip');
    function saveShortcutsFromDom() {
      var list = [];
      document.querySelectorAll('#panel-chat .cs-row').forEach(function (r) {
        var tr = r.querySelector('.cs-trigger');
        var cmd = r.querySelector('.cs-command');
        if (!tr || !cmd) return;
        var tval = tr.value.trim();
        var cval = cmd.value.trim();
        if (tval && cval) list.push({
          trigger: tval,
          expansion: cval,
          locked: r.getAttribute('data-locked') === '1'
        });
      });
      saveChatShortcuts(list);
    }
    if (opts.locked) row.setAttribute('data-locked', '1');
    if (triggerIn) triggerIn.onchange = saveShortcutsFromDom;
    if (commandIn) commandIn.onchange = saveShortcutsFromDom;
    if (clearBtn && !opts.locked) {
      clearBtn.onclick = function (e) {
        e.stopPropagation();
        row.remove();
        saveShortcutsFromDom();
      };
    }
    return reg(tab, trigger + ' ' + command, (kw || '') + ' shortcut chat atajo', row);
  }

  var MULTI_STORAGE = 'haxdesk_multi_auths';

  function multiIsPro() {
    try {
      var pw = Bridge.parentWin();
      if (pw && typeof pw.__hxdClientHasProAccess === 'function') {
        return !!pw.__hxdClientHasProAccess();
      }
    } catch (eHx) {}
    try {
      var w = Bridge.parentWin();
      while (w) {
        try {
          if (typeof w.__proIsPro === 'function' && w.__proIsPro()) return true;
          var st = w.__proStatus || w.__vipStatus;
          if (st && (st.is_pro || st.is_vip)) return true;
        } catch (eW) {}
        try {
          w = w.parent && w.parent !== w ? w.parent : null;
        } catch (eP) {
          w = null;
        }
      }
    } catch (eChain) {}
    try {
      var snap = JSON.parse(storageWin().localStorage.getItem('haxclient_pro_snapshot') || 'null');
      if (snap && (snap.is_pro || snap.is_vip)) return true;
    } catch (eSnap) {}
    return false;
  }

  function multiMaxSlots() {

  function multiLoadAuths() {
    try {

  function multiTruncateAuth(auth) {
    if (!auth || auth.length < 20) return auth || t('multi_no_auth');
    return auth.substring(0, 8) + '…' + auth.substring(auth.length - 6);

  function multiIsValidAuth(auth) {

    if (desc) desc.textContent = isSaveCurrent ? t('multi_save_current_h') : t('multi_add_h');

      overlay.classList.remove('open');
      overlay.setAttribute('aria-hidden', 'true');
      keyInput.readOnly = false;
      document.removeEventListener('keydown', onKey, true);
    }

    function onKey(ev) {
      if (ev.key === 'Escape') {
        ev.preventDefault();
        ev.stopPropagation();
        closeModal();
      }
    }

    cancelBtn.onclick = function () { closeModal(); };
    applyBtn.onclick = function () {
      var authKey = String(keyInput.value || '').trim();
      var authName = String(nameInput.value || '').trim();
      if (!authKey) {
        showToast(t('multi_invalid'), 'err');
        return;
      }
      if (!multiIsValidAuth(authKey)) {
        showToast(t('multi_invalid'), 'err');
        return;
      }
      var list = multiLoadAuths();
      if (list.some(function (a) { return a.key === authKey; })) {
        showToast(t('multi_exists'), 'err');
        return;
      }
      var max = multiMaxSlots();
      if (list.length >= max) {
        showToast(t('multi_limit_pro'), 'err');
        return;
      }
      if (!authName) authName = t('multi_slot') + ' ' + (list.length + 1);
      list.push({ name: authName, key: authKey });
      multiSaveAuths(list);
      closeModal();
      showToast(t('multi_saved'), 'ok');
      refreshMultiPanel();
    };

    overlay.classList.add('open');
    overlay.setAttribute('aria-hidden', 'false');
    document.addEventListener('keydown', onKey, true);
    if (!isSaveCurrent) {
      readImportCodeFromClipboard().then(function (clip) {
        var clipStr = String(clip || '').trim();
        if (clipStr && multiIsValidAuth(clipStr) && !keyInput.value) {
          keyInput.value = clipStr;
        }
        nameInput.focus();
      }).catch(function () { nameInput.focus(); });
    } else {
      nameInput.focus();
      nameInput.select();
    }
  }

  function perfOptToggle(tab, label, hint, readOn, writeOn) {
    var row = $('div', 'list-row click');
    var initial = false;
    try { initial = !!readOn(); } catch (eRead) {}
    row.innerHTML =
      '<div><div class="label">' + label + '</div>' +
      (hint ? '<div class="hint">' + hint + '</div>' : '') + '</div>' +
      '<label class="sw"><input type="checkbox"' + (initial ? ' checked' : '') + '><span class="sw-track"></span></label>';
    var input = row.querySelector('input');
    function applyToggle() {
      try { writeOn(input.checked); } catch (eWrite) {}
    }
    input.onchange = applyToggle;
    row.onclick = function (e) {
      if (e.target.tagName === 'INPUT') return;
      if (e.target.closest && e.target.closest('.sw')) return;
      input.checked = !input.checked;
      applyToggle();
    };
    return reg(tab, label, (hint || '') + ' optimizacion delay rendimiento performance', row);
  }

    }
    if (hook) {

      sel.onchange = function () { Bridge.setSelect(hook, sel.selectedIndex); };

  function mediaSlider(tab, label, val, min, max, step, suffix, kw) {
    var row = $('div', 'list-row list-row--stacked');
    var valEl = document.createElement('span');
    valEl.className = 'row-val';
    var rangeHook = null;
    if (kw) {
      if (kw.indexOf('resscale') !== -1) rangeHook = 'resscale-range';
      else if (kw.indexOf('chat opacity') !== -1 || kw.indexOf('chatopacity') !== -1) rangeHook = 'chatopacity-range';
      else if (kw.indexOf('chat focus') !== -1) rangeHook = 'chatfocusheight-range';
      else if (kw.indexOf('chat transparent') !== -1) rangeHook = 'hxd-chatbox-opacity-range';
      else if (kw.indexOf('scoreboard') !== -1) rangeHook = 'hxd-scoreboard-opacity-range';
    }
    var initial = val;
    if (rangeHook) {
      var fromParent = Bridge.readRange(rangeHook);
      if (fromParent !== null && !isNaN(fromParent)) initial = fromParent;
    }
    valEl.textContent = initial + (suffix || '');
    var top = $('div', 'row-top');
    top.appendChild($('span', 'label', label));
    top.appendChild(valEl);
    var range = document.createElement('input');
    range.type = 'range';
    range.min = min;
    range.max = max;
    range.step = step;
    range.value = initial;
    range.oninput = function () {
      valEl.textContent = range.value + (suffix || '');
      if (rangeHook) Bridge.setRange(rangeHook, range.value);
    };
    row.appendChild(top);
    row.appendChild(range);
    return reg(tab, label, (kw || '') + ' slider', row);
  }

  function appendResolutionToMedia(p) {
    var RES_PRESETS = [
      { width: 0, height: 0 },
      { width: 800, height: 600 },
      { width: 1024, height: 768 },
      { width: 1280, height: 960 },
      { width: 1280, height: 1024 },
      { width: 1440, height: 1080 }
    ];

    function formatResLabel(width, height) {
      return width > 0 && height > 0 ? (width + ' × ' + height) : t('native');
    }

    p.appendChild($('div', 'section-title section-title--split', t('sec_resolution')));
    var ul = $('div', 'list');
    var current = Bridge.readResolution();
    var activeRow = $('div', 'list-row');
    var activeChip = $('span', 'chip chip--active', formatResLabel(current.width, current.height));
    activeRow.innerHTML = '<div class="label">' + t('res_active') + '</div>';
    activeRow.appendChild(activeChip);
    ul.appendChild(reg('media', t('res_active'), 'stretched nativa resolution active', activeRow));

    var presetRow = mediaSelect('media', t('res_preset'), [
      'Nativo (0×0)', '800×600 (4:3)', '1024×768 (4:3)', '1280×960 (4:3)',
      '1280×1024 (5:4)', '1440×1080 (4:3)'
    ], 'stretched resolution preset');
    ul.appendChild(presetRow);

    var sizeRow = mediaResSize('media', t('res_width'), t('res_height'), 'width height stretched resolution');
    ul.appendChild(sizeRow);
    var wIn = sizeRow.querySelector('input[type="number"]:first-of-type') || sizeRow.querySelector('input');
    var inputs = sizeRow.querySelectorAll('input[type="number"]');
    if (inputs.length >= 2) {
      wIn = inputs[0];
      var hIn = inputs[1];
      wIn.value = current.width > 0 ? String(current.width) : '';
      hIn.value = current.height > 0 ? String(current.height) : '';

      function syncActiveChip() {
        var w = parseInt(wIn.value, 10) || 0;
        var h = parseInt(hIn.value, 10) || 0;
        activeChip.textContent = formatResLabel(w, h);
      }

      if (presetRow._hxdSelect) {
        presetRow._hxdSelect.onchange = function () {
          var idx = presetRow._hxdSelect.selectedIndex;
          var pr = RES_PRESETS[idx] || RES_PRESETS[0];
          wIn.value = pr.width > 0 ? String(pr.width) : '';
          hIn.value = pr.height > 0 ? String(pr.height) : '';
          Bridge.saveResolution(pr.width, pr.height);
          syncActiveChip();
        };
      }

      ul.appendChild(actionRow('media', t('res_apply'), null, '→', 'apply guardar resolution', function () {
        var w = parseInt(wIn.value, 10) || 0;
        var h = parseInt(hIn.value, 10) || 0;
        if (w <= 0 || h <= 0) return;
        Bridge.saveResolution(w, h);
        syncActiveChip();
      }));
      ul.appendChild(actionRow('media', t('res_use_native'), null, t('native'), 'native restore resolution', function () {
        wIn.value = '';
        hIn.value = '';
        Bridge.saveResolution(0, 0);
        if (presetRow._hxdSelect) presetRow._hxdSelect.selectedIndex = 0;
        syncActiveChip();
      }));
    }

    p.appendChild(ul);
  }

  function readImportCodeFromClipboard() {
    var pw = Bridge.parentWin();
    if (pw && pw.navigator && pw.navigator.clipboard && pw.navigator.clipboard.readText) {
      return pw.navigator.clipboard.readText().catch(function () { return ''; });

  function openPresetImportModal(onApply) {
    var overlay = document.getElementById('preset-import-overlay');
    var title = document.getElementById('preset-import-title');
    var desc = document.getElementById('preset-import-desc');
    var input = document.getElementById('preset-import-input');
    var cancelBtn = document.getElementById('preset-import-cancel');
    var applyBtn = document.getElementById('preset-import-apply');
    if (!overlay || !input || !cancelBtn || !applyBtn) return;

    if (title) title.textContent = t('perf_import');
    if (desc) desc.textContent = t('perf_import_desc');
    cancelBtn.textContent = t('perf_cancel');
    applyBtn.textContent = t('perf_import_apply');
    input.readOnly = false;
    input.value = '';

    function closeModal() {
      overlay.classList.remove('open');
      overlay.setAttribute('aria-hidden', 'true');
      document.removeEventListener('keydown', onKey, true);
    }

    function onKey(ev) {
      if (ev.key === 'Escape') {
        ev.preventDefault();
        ev.stopPropagation();
        closeModal();
      }
    }

    cancelBtn.onclick = function () { closeModal(); };
    applyBtn.onclick = function () {
      var code = String(input.value || '').trim();
      if (!code) {
        showToast(t('perf_import_fail'), 'err');
        return;
      }
      if (typeof onApply === 'function') onApply(code);
      closeModal();
    };

    overlay.classList.add('open');
    overlay.setAttribute('aria-hidden', 'false');
    document.addEventListener('keydown', onKey, true);
    readImportCodeFromClipboard().then(function (clip) {
      if (clip && !input.value) input.value = String(clip).trim();
      input.focus();
      input.select();
    }).catch(function () {
      input.focus();
    });
  }

  function runPerfExport() {
    var code = Bridge.perfExport();
    if (!code) {
      showToast(t('perf_export_fail'), 'err');
      return;
    }
    Bridge.copyText(code).then(function () {
      showToast(t('perf_export_ok'), 'ok');
    }).catch(function () {
      var overlay = document.getElementById('preset-import-overlay');
      var title = document.getElementById('preset-import-title');
      var desc = document.getElementById('preset-import-desc');
      var input = document.getElementById('preset-import-input');
      var cancelBtn = document.getElementById('preset-import-cancel');
      var applyBtn = document.getElementById('preset-import-apply');
      if (!overlay || !input) {
        showToast(t('perf_export_fail'), 'err');
        return;
      }
      function closeExportFallback() {
        overlay.classList.remove('open');
        overlay.setAttribute('aria-hidden', 'true');
        input.readOnly = false;
      }
      if (title) title.textContent = t('perf_export');
      if (desc) desc.textContent = t('perf_export_manual');
      if (cancelBtn) {
        cancelBtn.textContent = t('perf_cancel');
        cancelBtn.onclick = closeExportFallback;
      }
      if (applyBtn) {
        applyBtn.textContent = t('perf_cancel');
        applyBtn.onclick = closeExportFallback;
      }
      input.readOnly = true;
      input.value = code;
      overlay.classList.add('open');
      overlay.setAttribute('aria-hidden', 'false');
      input.focus();
      input.select();
      showToast(t('perf_export_manual'), 'err');
    });
  }

    look: function (p) {
      var themesBlock = $('div', 'list-block');
      themesBlock.appendChild($('div', 'section-title', t('look_themes_sec')));
      lookThemesMount = $('div', 'look-themes-wrap');
      themeGridEl = buildThemeGrid();
      lookThemesMount.appendChild(themeGridEl);
      themesBlock.appendChild(lookThemesMount);
      p.appendChild(themesBlock);
      p.appendChild(buildCustomThemePanel());
      var lookAvatarPanel = buildAvatarPanel('avatar-panel', 'look');
      p.appendChild(lookAvatarPanel);
      reg('look', t('misc_avatar_sec'), 'avatar foto imagem perfil pro visibilidade', lookAvatarPanel);
      p.appendChild(buildWallpaperPanel());
      themeGridEl.querySelectorAll('.theme-item').forEach(function (item) {
        var name = item.querySelector('strong').textContent;
        reg('look', 'Tema ' + name, 'theme apariencia color ' + item.getAttribute('data-theme'), item);
      });
      reg('look', t('look_wallpaper_sec'), 'wallpaper fondo background imagen', document.getElementById('wallpaper-panel'));
    },
    misc: function (p) {
      try {
        p.appendChild(fieldBlock('misc', t('misc_lang'),
          '<select id="misc-lang-select"><option value="es">' + t('lang_es') + '</option><option value="pt">' + t('lang_pt') + '</option><option value="en">' + t('lang_en') + '</option></select>', 'loc language idioma'));
        p.appendChild(list(null, [
          toggle('misc', t('misc_verified'), 'Jogadores verificados em sala', true, 'hax_verified_disabled verified'),
          toggle('misc', t('misc_zerozoom'), 'Zoom especial do cliente', false, 'hax_zero_zoom'),
          toggle('misc', t('misc_no_text'), t('misc_no_text_h'), false, 'hax_hide_match_status_text no text gamestart gamestop chat'),
          toggle('misc', t('misc_scoreboard_old'), t('misc_scoreboard_old_h'), false, 'hxd_scoreboard_old scoreboard marcador old vanilla')
        ]));
        var scoreboardButtonsField = fieldBlock('misc', t('misc_scoreboard_buttons'),
          '<select id="misc-scoreboard-buttons-select"><option value="default">' + t('misc_scoreboard_buttons_default') + '</option><option value="integrated">' + t('misc_scoreboard_buttons_integrated') + '</option></select>',
          'scoreboard buttons botoes marcador layout menu ajustes');
        scoreboardButtonsField.classList.add('field--split');
        p.appendChild(scoreboardButtonsField);
        var bl = $('div', 'btn-line');
        bl.innerHTML = '<button class="btn" type="button">' + t('misc_override') + '</button>';
        var overrideBtn = bl.querySelector('.btn');
        overrideBtn.onclick = function () { Bridge.clickParentHook('loc-ovr-btn'); };
        reg('misc', t('misc_override'), 'loc-ovr bandeira flag location localizacao pais', overrideBtn);
        p.appendChild(bl);
      } catch (eMisc) {
        p.appendChild(listGroup('Misc', '', [
          toggle('misc', t('misc_verified'), 'Jogadores verificados em sala', true, 'hax_verified_disabled verified'),
          toggle('misc', t('misc_zerozoom'), 'Zoom especial do cliente', false, 'hax_zero_zoom'),
          toggle('misc', t('misc_scoreboard_old'), t('misc_scoreboard_old_h'), false, 'hxd_scoreboard_old scoreboard marcador old vanilla')
        ]));
      }
      try {
        var miscAvatarPanel = buildAvatarPanel('avatar-panel-misc', 'misc');
        p.appendChild(miscAvatarPanel);
        reg('misc', t('misc_avatar_sec'), 'avatar foto subir imagem perfil pro', miscAvatarPanel);
      } catch (eAvatarPanel) {}

    }
  };

  /* ─── Búsqueda ─── */
  var navbar = document.getElementById('navbar');
  var searchToggle = document.getElementById('search-toggle');
  var searchInput = document.getElementById('search-input');
  var searchResults = document.getElementById('search-results');
  var searchOpen = false;
  var focusedHit = -1;

  function openSearch() {
    searchOpen = true;
    navbar.classList.add('search-open');
    searchToggle.classList.add('search-active');
    searchInput.focus();
    runSearch(searchInput.value);
  }

  function closeSearch() {
    searchOpen = false;
    navbar.classList.remove('search-open');
    searchToggle.classList.remove('search-active');
    searchResults.classList.remove('open');
    searchInput.value = '';
    focusedHit = -1;
  }

  function normalizeQ(s) {
    return String(s || '').toLowerCase().trim();
  }

  function runSearch(q) {
    q = normalizeQ(q);
    searchResults.innerHTML = '';
    focusedHit = -1;
    if (!q) {
      searchResults.classList.remove('open');
      return;
    }
    var hits = SEARCH_INDEX.filter(function (item) { return item.text.indexOf(q) !== -1; });
    if (!hits.length) {
      searchResults.innerHTML = '<div class="search-empty">' + t('ui_search_empty') + q.replace(/</g, '') + '»</div>';
      searchResults.classList.add('open');
      return;
    }
    hits.slice(0, 24).forEach(function (hit, idx) {
      var row = $('div', 'search-hit');
      row.innerHTML = '<span class="sh-label">' + hit.label + '</span><span class="sh-tab">' + hit.tabLabel + '</span>';
      row.onclick = function () { goToSearchHit(hit); };
      row.setAttribute('data-idx', String(idx));
      searchResults.appendChild(row);
    });
    searchResults.classList.add('open');
  }

  function goToSearchHit(hit) {
    closeSearch();
    switchTab(hit.tab);
    var el = document.querySelector('[data-search-id="' + hit.id + '"]');
    if (el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      el.classList.remove('search-flash');
      void el.offsetWidth;
      el.classList.add('search-flash');
    }
  }

  searchToggle.onclick = function () {
    closeLangMenu();
    if (searchOpen) closeSearch();
    else openSearch();
  };

  searchInput.oninput = function () { runSearch(searchInput.value); };

  searchInput.onkeydown = function (e) {
    var hits = searchResults.querySelectorAll('.search-hit');
    if (e.key === 'Escape') { e.preventDefault(); closeSearch(); return; }
    if (e.key === 'ArrowDown' && hits.length) {
      e.preventDefault();
      focusedHit = Math.min(focusedHit + 1, hits.length - 1);
    } else if (e.key === 'ArrowUp' && hits.length) {
      e.preventDefault();
      focusedHit = Math.max(focusedHit - 1, 0);
    } else if (e.key === 'Enter' && hits.length && focusedHit >= 0) {
      e.preventDefault();
      hits[focusedHit].click();
      return;
    } else return;
    hits.forEach(function (h, i) { h.classList.toggle('focused', i === focusedHit); });
    if (hits[focusedHit]) hits[focusedHit].scrollIntoView({ block: 'nearest' });
  };

  document.addEventListener('keydown', function (e) {
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') {
      e.preventDefault();
      if (searchOpen) closeSearch();
      else openSearch();
    }
  });

  document.addEventListener('click', function (e) {
    if (!searchOpen) return;
    var navShell = document.getElementById('nav-shell');
    if (navShell && !navShell.contains(e.target)) closeSearch();
  });

  /* ─── Idioma (globo) ─── */
  var LANG_OPTIONS = [
    { id: 'es', labelKey: 'lang_es' },
    { id: 'en', labelKey: 'lang_en' },
    { id: 'pt', labelKey: 'lang_pt' }
  ];
  var langToggle = document.getElementById('lang-toggle');
  var langMenu = document.getElementById('lang-menu');
  var langOpen = false;

  function renderLangMenu() {
    langMenu.innerHTML = '<div class="lang-menu__title">' + t('ui_lang') + '</div>';
    LANG_OPTIONS.forEach(function (opt) {
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'lang-option' + (opt.id === currentLang ? ' on' : '');
      btn.setAttribute('role', 'option');
      btn.setAttribute('aria-selected', opt.id === currentLang ? 'true' : 'false');
      btn.setAttribute('data-lang', opt.id);
      btn.textContent = t(opt.labelKey);
      btn.onclick = function (e) {
        e.stopPropagation();
        setLanguage(opt.id);
      };
      langMenu.appendChild(btn);
    });
  }

  function setLanguage(id) {
    if (id !== 'es' && id !== 'en' && id !== 'pt') return;
    currentLang = id;
    Bridge.setLanguageBridge(id);
    var prevTab = active;
    buildSettingsUi();
    switchTab(prevTab);
    applyUiStrings();
    syncThemeUi();
    renderLangMenu();
    closeLangMenu();
    if (searchOpen) runSearch(searchInput.value);
  }

  function openLangMenu() {
    closeSearch();
    langOpen = true;
    langToggle.classList.add('lang-active');
    langToggle.setAttribute('aria-expanded', 'true');
    renderLangMenu();
    langMenu.classList.add('open');
  }

  function closeLangMenu() {
    langOpen = false;
    langToggle.classList.remove('lang-active');
    langToggle.setAttribute('aria-expanded', 'false');
    langMenu.classList.remove('open');
  }

  langToggle.onclick = function (e) {
    e.stopPropagation();
    if (langOpen) closeLangMenu();
    else openLangMenu();
  };

  document.addEventListener('click', function (e) {
    if (!langOpen) return;
    if (langToggle && langMenu && !langToggle.contains(e.target) && !langMenu.contains(e.target)) closeLangMenu();
  });

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && langOpen) closeLangMenu();
  });

  function closeSettingsPreview() {
    try {
      var pw = Bridge.parentWin();
      var pd = Bridge.parentDoc();
      if (pd && typeof pd.__hxdCloseSettingsPreviewAnimated === 'function' &&
          (settingsBackFromRoomlist || isOpenedFromRoomlistContext())) {
        pd.__hxdCloseSettingsPreviewAnimated();
        return;
      }
      if (pw) pw.__hxdSuppressSettingsEscUntil = Date.now() + 700;
      if (pw && typeof pw.__hxdCloseSettingsPreview === 'function') {
        pw.__hxdCloseSettingsPreview();
        return;
      }
      var doc = Bridge.parentDoc();
      var previewClose = doc && doc.getElementById('hxd-settings-preview-close');
      if (previewClose) {
        previewClose.click();
        return;
      }
      var nativeClose = doc && doc.querySelector('.dialog.settings-view button[data-hook="close"]');
      if (nativeClose) nativeClose.click();
    } catch (eClose) {}
  }

  var settingsBackFromRoomlist = false;

  function isOpenedFromRoomlistContext() {
    try {
      var pw = Bridge.parentWin();
      var pd = Bridge.parentDoc();
      if (pw && pw.__hxdSettingsRoomlistSession) return true;
      if (pd && pd.__hxdSettingsRoomlistSession) return true;
      if (pw && pw.__hxdSettingsOpenedFromRoomlistUntil && Date.now() < pw.__hxdSettingsOpenedFromRoomlistUntil) return true;
      if (pd && pd.__hxdSettingsOpenedFromRoomlistUntil && Date.now() < pd.__hxdSettingsOpenedFromRoomlistUntil) return true;
      if (pw && pw.__hxdSettingsOpenedFromRoomlist) return true;
      if (pd && pd.__hxdSettingsOpenedFromRoomlist) return true;
    } catch (eCtx) {}
    return false;
  }

  function applySettingsBackBtn(fromRoomlist, settingsOpen) {
    var settingsBackBtn = document.getElementById('settings-back-btn');
    if (!settingsBackBtn) return;
    if (fromRoomlist) settingsBackFromRoomlist = true;
    if (settingsOpen === false && !isOpenedFromRoomlistContext()) {
      settingsBackFromRoomlist = false;
    }
    settingsBackBtn.classList.toggle('hidden', settingsOpen === false);
  }

  function refreshSettingsBackBtn() {
    applySettingsBackBtn(isOpenedFromRoomlistContext(), true);
  }

  var settingsBackBtnEl = document.getElementById('settings-back-btn');
  if (settingsBackBtnEl) {
    settingsBackBtnEl.addEventListener('click', function () {
      closeSettingsPreview();
    });
  }

  window.addEventListener('message', function (e) {
    var data = e.data;
    if (!data || data.type !== 'hxd-settings-sync') return;
    if (typeof data.openedFromRoomlist === 'boolean') {
      applySettingsBackBtn(data.openedFromRoomlist, data.settingsOpen !== false);
    }
  });

  (function pollSettingsBackBtn() {
    refreshSettingsBackBtn();
    var iv = setInterval(function () {
      refreshSettingsBackBtn();
      try {
        var pd = Bridge.parentDoc();
        if (settingsBackFromRoomlist && pd && !pd.querySelector('.dialog.settings-view')) {
          settingsBackFromRoomlist = false;
          applySettingsBackBtn(false, false);
          clearInterval(iv);
        }
      } catch (ePoll) {}
    }, 150);
  })();

  document.addEventListener('keydown', function (e) {
    if (e.key !== 'Escape') return;
    if (document.documentElement.classList.contains('kb-capturing')) return;
    if (langOpen) return;
    if (searchOpen) return;
    var presetOv = document.getElementById('preset-import-overlay');
    if (presetOv && presetOv.classList.contains('open')) return;
    var multiOv = document.getElementById('multi-add-overlay');
    if (multiOv && multiOv.classList.contains('open')) return;
    var avatarCropOv = document.getElementById('avatar-crop-overlay');
    if (avatarCropOv && avatarCropOv.classList.contains('open')) {
      closeAvatarCropEditor(true);
      e.preventDefault();
      e.stopPropagation();
      if (typeof e.stopImmediatePropagation === 'function') e.stopImmediatePropagation();
      return;
    }
    e.preventDefault();
    e.stopPropagation();
    if (typeof e.stopImmediatePropagation === 'function') e.stopImmediatePropagation();
    closeSettingsPreview();
  }, true);

  document.addEventListener('keyup', function (e) {
    if (e.key !== 'Escape') return;
    var pw = Bridge.parentWin();
    if (!pw || Date.now() > (pw.__hxdSuppressSettingsEscUntil || 0)) return;
    e.preventDefault();
    e.stopPropagation();
    if (typeof e.stopImmediatePropagation === 'function') e.stopImmediatePropagation();
  }, true);

  function bootstrapSettingsPreview() {
    loadUserTheme();
    try {
      var resolved = resolveSavedThemeId(themeStorage().getItem(THEME_STORAGE_KEY));
      if (resolved) {
        currentThemeId = resolved;
      } else {
        var pwInit = themesHostWin();
        if (pwInit && pwInit.HaxThemes && typeof pwInit.HaxThemes.getCurrent === 'function') {
          currentThemeId = Bridge.themeFromBridge(pwInit.HaxThemes.getCurrent());
        }
      }
    } catch (eThemeInit) {}

    buildSettingsUi();
    applyUiStrings();
    renderLangMenu();
    initAvatarCropEditor();
    applyTheme(currentThemeId);
    refreshSettingsNavbarAvatar();
    prefetchAvatarSessionForNavbar();
    try {
      var pwAv = Bridge.parentWin();
      if (pwAv) {
        pwAv.addEventListener('hxd-avatar-profile-changed', function () {
          refreshSettingsNavbarAvatar();
          var previewRing = document.querySelector('#avatar-panel .avatar-panel-preview');
          var statusEl = document.querySelector('#avatar-panel .avatar-panel-status');
          if (previewRing) syncAvatarPanelUi(previewRing, statusEl);
        });
      }
    } catch (eAvListen) {}
    setTimeout(refreshInputPanelIfNeeded, 120);
    refreshSettingsBackBtn();
    setTimeout(refreshInputPanelIfNeeded, 400);
  }

  bootstrapSettingsPreview();

  document.addEventListener('contextmenu', function (e) {
    e.preventDefault();
  }, true);

  document.addEventListener('selectstart', function (e) {
    var tag = e.target && e.target.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA') return;
    if (e.target && e.target.isContentEditable) return;
    e.preventDefault();
  }, true);
})();
</script>
